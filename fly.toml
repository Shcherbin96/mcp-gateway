app = "mcp-gateway"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_OAUTH_ISSUER = "https://mcp-mock-idp.fly.dev"
  MCP_OAUTH_JWKS_URL = "https://mcp-mock-idp.fly.dev/jwks"
  MCP_CRM_BASE_URL = "https://mcp-mock-crm.fly.dev"
  MCP_PAYMENTS_BASE_URL = "https://mcp-mock-payments.fly.dev"
  MCP_LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks.http]]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      timeout = "5s"
      path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
