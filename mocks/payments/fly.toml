app = "mcp-mock-payments"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_LOG_LEVEL = "INFO"

[http_service]
  internal_port = 9002
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [[http_service.checks.http]]
      grace_period = "10s"
      interval = "30s"
      method = "GET"
      timeout = "5s"
      path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
