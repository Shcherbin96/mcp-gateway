name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy gateway

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest -m "unit" -v --cov=gateway --cov-report=term --cov-fail-under=35

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: pytest -m "integration" -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: docker compose -f docker-compose.test.yml up -d --build
      - run: sleep 20
      - run: pytest -m "e2e" -v
      - if: always()
        run: docker compose -f docker-compose.test.yml down

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: bandit -r gateway -x tests
      - run: pip-audit || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, unit]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t mcp-gateway:ci -f Dockerfile .
      - run: docker build -t mock-crm:ci -f mocks/crm/Dockerfile mocks/crm
      - run: docker build -t mock-payments:ci -f mocks/payments/Dockerfile mocks/payments
      - run: docker build -t mock-idp:ci -f mocks/idp/Dockerfile mocks/idp

  load-smoke:
    runs-on: ubuntu-latest
    needs: e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install -e ".[dev]"
      - run: docker compose -f docker-compose.test.yml up -d --build
      - run: sleep 20
      - run: locust -f loadtest/locustfile.py --headless -u 10 -r 5 -t 30s --host http://localhost:8000 --only-summary
      - if: always()
        run: docker compose -f docker-compose.test.yml down

  # Deploy job is opt-in: only runs when FLY_API_TOKEN is set as a repo secret.
  # For now the gateway is run-locally / self-hosted; uncomment once Fly.io
  # account + token are wired up.
