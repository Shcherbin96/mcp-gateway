version: 1
roles:
  - name: support_agent
    tools:
      - tool: get_customer
      - tool: list_orders
      - tool: update_order
      - tool: refund_payment
        # Approval required only for refunds over $1000; smaller refunds run
        # straight through. Conditions are OR-combined: any match → approval.
        requires_approval:
          - param: amount
            op: gt
            value: 1000
  - name: readonly_analyst
    tools:
      - tool: get_customer
      - tool: list_orders
  - name: finance_admin
    tools:
      - tool: refund_payment
        requires_approval: true
      - tool: charge_card
        requires_approval: true
